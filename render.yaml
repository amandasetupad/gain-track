# Render Web Service config for GainTrack backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gain-track-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      # Set DATABASE_URL to your Render PostgreSQL "Internal Database URL" to persist data
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
